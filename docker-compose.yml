version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: mood-rule-postgres
    environment:
      POSTGRES_DB: mood_rules
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mood-rule-network

  # Mood-Rule-Service
  mood-rule-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mood-rule-service
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "50051:50051"  # gRPC
      - "8080:8080"    # HTTP health/metrics
    environment:
      # Server Configuration
      GRPC_PORT: 50051
      HEALTH_PORT: 8080

      # Database Configuration
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: mood_rules
      DB_MAX_CONNS: 25
      DB_MIN_CONNS: 5

      # Auth Service Configuration
      AUTH_SERVICE_ADDR: auth-service:50052
      AUTH_SERVICE_TIMEOUT: 5s
      AUTH_SERVICE_MAX_RETRIES: 3

      # Product Catalog Configuration
      PRODUCT_CATALOG_ADDR: product-catalog:50053
      PRODUCT_CATALOG_TIMEOUT: 5s
      PRODUCT_CATALOG_MAX_RETRIES: 3

      # Engine Configuration
      ENGINE_INITIAL_CAPACITY: 1000
      ENGINE_RELOAD_INTERVAL: 5m
      ENGINE_MAX_CONCURRENCY: 10000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - mood-rule-network
    restart: unless-stopped

  # API Gateway (from parent directory)
  # Uncomment and adjust this section if you have an API Gateway
  # api-gateway:
  #   build:
  #     context: ../CTSE-API-Gateway
  #     dockerfile: Dockerfile
  #   container_name: api-gateway
  #   depends_on:
  #     - mood-rule-service
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     MOOD_RULE_SERVICE_URL: mood-rule-service:50051
  #   networks:
  #     - mood-rule-network

volumes:
  postgres_data:
    driver: local

networks:
  mood-rule-network:
    driver: bridge
