syntax = "proto3";

package productcatalog;

option go_package = "github.com/randil-h/CTSE-Mood-Rule-Service/proto/productcatalog";

// ProductCatalogService provides product information
service ProductCatalogService {
  rpc GetProductsByFilters(ProductFilterRequest) returns (ProductList);
  rpc NotifyMoodUpdate(MoodUpdateNotification) returns (MoodUpdateAcknowledgment);
}

// ProductFilterRequest specifies filters for product search
message ProductFilterRequest {
  repeated string tags = 1;
  repeated string categories = 2;
  double min_price = 3;
  double max_price = 4;
  int32 limit = 5;
  string trace_id = 6;
}

// ProductList contains a list of products
message ProductList {
  repeated Product products = 1;
  int32 total_count = 2;
}

// Product represents a single product
message Product {
  string product_id = 1;
  string name = 2;
  string description = 3;
  double price = 4;
  string category = 5;
  repeated string tags = 6;
  string image_url = 7;
  bool in_stock = 8;
}

// MoodUpdateNotification contains mood update information
message MoodUpdateNotification {
  string user_id = 1;
  string mood = 2;
  string previous_mood = 3;
  string session_id = 4;
  int64 timestamp = 5;
  MoodMetadata metadata = 6;
}

// MoodMetadata contains additional context about mood update
message MoodMetadata {
  string source = 1;
  int32 response_time = 2;
  string device_type = 3;
}

// MoodUpdateAcknowledgment confirms mood update receipt
message MoodUpdateAcknowledgment {
  bool success = 1;
  string correlation_id = 2;
  int64 timestamp = 3;
  int32 recommendations_generated = 4;
}
